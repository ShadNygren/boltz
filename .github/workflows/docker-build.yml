name: Build and Push Docker Image

on:
  push:
    branches: [ docker-pytorch ]
    paths:
      - 'Dockerfile'
      - 'docker-compose.yml' 
      - '.dockerignore'
      - 'build_docker.sh'
      - 'src/**'
      - 'pyproject.toml'
  pull_request:
    branches: [ docker-pytorch ]
    paths:
      - 'Dockerfile'
      - 'docker-compose.yml'
      - '.dockerignore' 
      - 'build_docker.sh'
      - 'src/**'
      - 'pyproject.toml'
  workflow_dispatch:  # Manual trigger

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        load: true
        tags: boltz:test
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64

    - name: Test Docker image
      run: |
        # Test basic functionality
        docker run --rm boltz:test boltz --help
        
        # Test CPU mode (no GPU in GitHub Actions)
        mkdir -p test_data
        echo "sequences:
          - protein:
              id: A
              sequence: MKFLVNVALVFMVVYISYIYAA" > test_data/test.yaml
        
        # Quick validation (don't run full prediction due to time limits)
        timeout 60s docker run --rm -v $(pwd)/test_data:/app/data boltz:test \
          boltz predict /app/data/test.yaml --accelerator cpu --diffusion_samples 1 --sampling_steps 10 || true

    - name: Build and push Docker image
      if: github.event_name != 'pull_request'
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64

  security-scan:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    
    steps:
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: 'trivy-results.sarif'